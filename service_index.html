<html lang="ko">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핵심지표 대시보드</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;color:#1d1d1f;font-family:Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:13px;letter-spacing:-.011em;line-height:1.55;-webkit-font-smoothing:antialiased;}
.header{background:#fff;border-bottom:1px solid #e8e8ed;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:17px}
.title{margin-left:10px}.title h1{font-size:14px;font-weight:700}.title p{font-size:10px;color:#888;margin-top:1px}
to{transform:rotate(360deg)}}
.content{padding:20px 24px;max-width:1280px;margin:0 auto}

/* ── 미션 목표 배너 ── */
.mission-banner{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mbcard{background:#fff;border-radius:10px;padding:11px 16px;flex:1;min-width:200px;border:1px solid #EBEDF0;display:flex;align-items:center;gap:12px}
.mbcard .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mbcard .info{}
.mbcard .lb{font-size:10px;color:#888;margin-bottom:2px}
.mbcard .row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.mbcard .base{font-size:12px;color:#94A3B8}
.mbcard .arrow{font-size:11px;color:#CBD5E1}
.mbcard .goal{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.mbcard .cur{font-size:11px;padding:1px 6px;border-radius:4px;font-weight:600;margin-left:4px}

/* ── KPI ── */
.kpi-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.kpi{background:#fff;border-radius:10px;padding:13px 15px;flex:1;min-width:150px;border:1px solid #e8e8ed;border-radius:12px;}
.kpi .lb{font-size:10px;color:#888;letter-spacing:.04em;margin-bottom:4px}
.kpi .vl{font-size:22px;font-weight:700;color:#111;font-family:'DM Mono',monospace}
.kpi .mo{font-size:10px;color:#2563EB;font-weight:600;margin-top:2px}
.kpi .sb{font-size:10px;color:#888;margin-top:1px}
.kpi .dt{font-size:11px;font-weight:600;margin-top:3px}

/* ── 미션 게이지 ── */
.mission-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mission{background:#fff;border-radius:10px;padding:12px 15px;flex:1;min-width:180px;border:1px solid #e8e8ed;border-radius:12px;}
.mission .lb{font-size:10px;color:#888;margin-bottom:5px}
.mission .vrow{display:flex;align-items:baseline;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.mission .big{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.mission .tgt{font-size:10px;color:#888}
.mission .gtag{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700;background:#fef2f2;color:#c93a30;}
.bar-bg{background:#f0f0f3;border-radius:4px;height:5px;position:relative;margin-bottom:4px;overflow:hidden}
.bar-fill{height:5px;border-radius:4px;transition:width .7s ease}
.bar-lbs{display:flex;justify-content:space-between;font-size:9px;color:#999}

/* ── 차트 ── */
.cards-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.cards-2{grid-template-columns:1fr}}
.card{background:#fff;border-radius:14px;padding:16px 18px;border:1px solid #e8e8ed}
.card .ct{font-size:11.5px;font-weight:700;color:#333;margin-bottom:4px}
.card .csub{font-size:10px;color:#888;margin-bottom:8px;line-height:1.4}
.cw{position:relative;width:100%}
.cw canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}
.inote{background:#f5f5f7;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11.5px;color:#3a3a3c;line-height:1.6;border:none}
.sec-title{font-size:11.5px;font-weight:700;color:#6e6e73;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid #e8e8ed;letter-spacing:.04em;text-transform:uppercase}
.err{margin:8px 20px;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:8px 12px;font-size:11px;color:#DC2626}
</style>
</head>

// ─── 유틸 ─────────────────────────
function lastVal(a){for(let i=a.length-1;i>=0;i--){if(a[i]!=null&&a[i]>0.5)return{v:a[i],i};}return{v:null,i:-1};}
function pct(v,d=1){return v==null?"—":v.toFixed(d)+"%";}
function num(v){return v==null?"—":Number(v).toLocaleString("ko-KR");}
function bil(v){return v==null?"—":(v/100).toFixed(1)+"억";}
function dlt(c,p,unit=""){
  if(c==null||p==null)return{t:"",col:"#888"};
  const d=c-p,ds=Math.abs(d)>1?Math.round(Math.abs(d)).toLocaleString("ko-KR"):Math.abs(d).toFixed(1);
  return{t:d>0?`▲ +${ds}${unit}`:d<0?`▼ -${ds}${unit}`:"─",col:d>0?"#16A34A":d<0?"#DC2626":"#888"};
}
function mName(code){const[y,m]=code.split("-");return `20${y}년 ${parseInt(m)}월`;}

function kpiHtml(lb,vl,mo,sb,d,a){
  return `<div class="kpi" style="--a:${a}">

    ${sb?`<div class="sb">${sb}</div>`:""}
    ${d&&d.t?`<div class="dt" style="color:${d.col}">${d.t}</div>`:""}
  </div>`;
}
function missionHtml(lb,cur,b,t,ac,mo=""){
  const s=cur??0,p=Math.min(100,(s/t)*100),bp=Math.min(100,(b/t)*100),g=cur!=null?(t-s).toFixed(1):null;
  return `<div class="mission">
    <div class="lb">${lb}${mo?` <span style="font-weight:400;color:#aaa">(${mo})</span>`:""}</div>
    <div class="vrow">
      <span class="big" style="color:${ac}">${cur!=null?s.toFixed(1)+"%":"—"}</span>
      <span class="tgt">→ 목표 ${t}%</span>
      ${g?`<span class="gtag">-${g}%p</span>`:""}
    </div>
    <div class="bar-bg">
      <div style="position:absolute;left:${bp}%;top:0;bottom:0;width:2px;background:#CBD5E1;z-index:2"></div>

    </div>

// ─── 트렌드 탭 렌더 ─────────────────────────────────────────────────────────
function renderTrend(){
  const el=document.getElementById("content");
  const N=Math.max(PY_LBL.length,CY_LBL.length);
  // x축: 1~52 (주 번호), CY는 27주까지만 채움
  const XLBL=PY_LBL; // 52주 기준
  // CY 패딩 (52주에 맞게 null 채우기)
  function pad(a,n){const r=[...a];while(r.length<n)r.push(null);return r;}

  const metrics=[
    {key:'new',   label:'신규 가입자수',          unit:'명',   color:'#2563EB', py:PY_NEW,   cy:CY_NEW,   isRate:false,
     insight:'⚠ 25년 4월 급등: 리워드 매체 테스트 집행으로 가입자 수 급증 — 단, 실제 주문 전환까지 이어지지 않아 전환율 지표에 동반 하락.'},
    {key:'pick',  label:'첫 수거신청자수',          unit:'명',   color:'#0D9488', py:PY_PICKUP,cy:CY_PICKUP,isRate:false,
     insight:null},
    {key:'d7',    label:'첫주문 전환율 (D+7)',       unit:'%',    color:'#16A34A', py:PY_D7,    cy:CY_D7,    isRate:true,
     insight:'⚠ 25년 4월 급락: 리워드 매체 유입 가입자 증가로 전환율 하락 (비구매 의도 유저 다수). 전환율은 이후 회복됨.'},
    {key:'wau',   label:'주 활성유저수 (WAU)',       unit:'명',   color:'#7C3AED', py:PY_WAU,   cy:CY_WAU,   isRate:false,
     insight:null},
    {key:'sub',   label:'구독 가입자수 (신규+기존)', unit:'명',   color:'#F97316', py:PY_SUB,   cy:CY_SUB,   isRate:false,
     insight:'📌 구조적 감소: 플러스구독 출시 및 1회성 어뷰징 방지를 위한 가격 체계 개편. 성수기 단기 가입 최소화 의도 — 해지율 개선 효과 기대.'},
    {key:'cancel',label:'구독 해지자수',            unit:'명',   color:'#DC2626', py:PY_CANCEL,cy:CY_CANCEL,isRate:false,
     insight:'⚠ 26년 4~5월 해지자수 급증: 손익 영향이 큰 와이셔츠&드라이 요금제 마이그레이션 집행. 해당 유저 플러스구독으로 윈백 캠페인 진행 중.'},
  ];

  // 6월 대비 YoY 뱃지 (CY vs PY 같은 주차 비교, 6/1주 기준)
  function yoyBadge(py,cy,isRate,key){
    // CY_LBL에서 "6/1" 찾기
    const ci=CY_LBL.indexOf("6/1"); const pi=PY_LBL.indexOf("6/2");
    if(ci<0||pi<0||!cy[ci]||!py[pi]) return "";
    const d=cy[ci]-py[pi];
    const pct=isRate?d.toFixed(1)+"%p":((d/py[pi])*100).toFixed(0)+"%";
    const good=key==="cancel"?d<0:d>0;
    const col=good?"#188a4e":"#c93a30";
    const sign=d>0?"+":"";
    return `<span style="font-size:10px;padding:1px 5px;border-radius:4px;background:${col}18;color:${col};font-weight:700">${sign}${pct} YoY</span>`;
  }

  let cards="";
  metrics.forEach(m=>{
    const insight=m.insight?`<div style="margin-top:8px;background:#f5f5f7;border-radius:7px;padding:7px 10px;font-size:10.5px;color:#3a3a3c;line-height:1.55">${m.insight}</div>`:'';
    cards+=`<div class="card">
      <div class="ct">${m.label} ${yoyBadge(m.py,m.cy,m.isRate,m.key)}</div>
      <div class="csub">주간 | 회색: 2025 / 컬러: 2026 (7/6까지) | 출처: Weekly값.T</div>
      <div class="cw" style="height:${m.insight?175:195}px"><canvas id="tr_${m.key}"></canvas></div>
      ${insight}
    </div>`;
  });

  el.innerHTML=`
    <div style="background:var(--panel);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11.5px;color:#3a3a3c;line-height:1.6">
      📅 <b>주간 YoY 트렌드</b> — 2025 vs 2026 주별 비교 | 투자사 격주 미팅용 | 출처: [Weekly값.T] 엑셀 원본
    </div>
    <div class="cards-2" style="margin-bottom:14px">${cards}</div>`;

  const CY_N=CY_LBL.length;
  const base={responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:"#555",font:{size:10,family:"Pretendard"},boxWidth:10,padding:8}},
             tooltip:{backgroundColor:"#fff",borderColor:"#e8e8ed",borderWidth:1,titleColor:"#333",bodyColor:"#555",padding:7}},
    scales:{x:{grid:{color:GC},ticks:{color:TC,font:{size:8},maxRotation:45,
      callback:(v,i)=>((i%4===0)||i===CY_N-1)?XLBL[i]:''
    }},y:{grid:{color:GC},ticks:{color:TC,font:{size:9}}}}};

  metrics.forEach(m=>{
    const cyPad=pad(m.cy,XLBL.length);
    const opts=JSON.parse(JSON.stringify(base));
    if(m.isRate){
      opts.scales.y.ticks.callback=v=>v+"%";
    } else {
      opts.scales.y.ticks.callback=v=>v>=1000?(v/1000).toFixed(0)+"K":v;
    }
    opts.plugins.tooltip.callbacks={
      label:ctx=>{
        const v=ctx.parsed.y;
        if(v==null) return null;
        return ` ${ctx.dataset.label}: ${m.isRate?v.toFixed(1)+"%":Number(v).toLocaleString("ko-KR")+m.unit}`;
      }
    };
    charts[`tr_${m.key}`]=new Chart(document.getElementById(`tr_${m.key}`),{
      type:"line",
      data:{labels:XLBL,datasets:[
        {label:"PY 2025",data:m.py,borderColor:"#c7c7cc",backgroundColor:"transparent",borderWidth:1.5,pointRadius:0,tension:0.3,spanGaps:true},
        {label:"CY 2026",data:cyPad,borderColor:m.color,backgroundColor:m.color+"18",fill:true,borderWidth:2.5,pointRadius:2,tension:0.3,spanGaps:false},
      ]},options:opts
    });
  });
}

// ─── 탭 전환 ───────────────────────────

function go(t,btn){
  tab=t;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

render();
function render(){
  kill();
  if(tab==="tr"){renderTrend();return;}
  renderOv();
}
