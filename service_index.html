<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핵심지표 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;color:#1d1d1f;font-family:Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:13px;letter-spacing:-.011em;line-height:1.55;-webkit-font-smoothing:antialiased;}
.header{background:#fff;border-bottom:1px solid #e8e8ed;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:17px}
.title{margin-left:10px}.title h1{font-size:14px;font-weight:700}.title p{font-size:10px;color:#888;margin-top:1px}
.sync-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Noto Sans KR',sans-serif}
.sync-btn:disabled{background:#ccc;cursor:not-allowed}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.content{padding:20px 24px;max-width:1280px;margin:0 auto}

/* ── 미션 목표 배너 ── */
.mission-banner{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mbcard{background:#fff;border-radius:10px;padding:11px 16px;flex:1;min-width:200px;border:1px solid #EBEDF0;display:flex;align-items:center;gap:12px}
.mbcard .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mbcard .info{}
.mbcard .lb{font-size:10px;color:#888;margin-bottom:2px}
.mbcard .row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.mbcard .base{font-size:12px;color:#94A3B8}
.mbcard .arrow{font-size:11px;color:#CBD5E1}
.mbcard .goal{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.mbcard .cur{font-size:11px;padding:1px 6px;border-radius:4px;font-weight:600;margin-left:4px}

/* ── KPI ── */
.kpi-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.kpi{background:#fff;border-radius:10px;padding:13px 15px;flex:1;min-width:150px;border:1px solid #e8e8ed;border-radius:12px;}
.kpi .lb{font-size:10px;color:#888;letter-spacing:.04em;margin-bottom:4px}
.kpi .vl{font-size:22px;font-weight:700;color:#111;font-family:'DM Mono',monospace}
.kpi .mo{font-size:10px;color:#2563EB;font-weight:600;margin-top:2px}
.kpi .sb{font-size:10px;color:#888;margin-top:1px}
.kpi .dt{font-size:11px;font-weight:600;margin-top:3px}

/* ── 미션 게이지 ── */
.mission-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mission{background:#fff;border-radius:10px;padding:12px 15px;flex:1;min-width:180px;border:1px solid #e8e8ed;border-radius:12px;}
.mission .lb{font-size:10px;color:#888;margin-bottom:5px}
.mission .vrow{display:flex;align-items:baseline;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.mission .big{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.mission .tgt{font-size:10px;color:#888}
.mission .gtag{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700;background:#fef2f2;color:#c93a30;}
.bar-bg{background:#f0f0f3;border-radius:4px;height:5px;position:relative;margin-bottom:4px;overflow:hidden}
.bar-fill{height:5px;border-radius:4px;transition:width .7s ease}
.bar-lbs{display:flex;justify-content:space-between;font-size:9px;color:#999}

/* ── 차트 ── */
.cards-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.cards-2{grid-template-columns:1fr}}
.card{background:#fff;border-radius:14px;padding:16px 18px;border:1px solid #e8e8ed}
.card .ct{font-size:11.5px;font-weight:700;color:#333;margin-bottom:4px}
.card .csub{font-size:10px;color:#888;margin-bottom:8px;line-height:1.4}
.cw{position:relative;width:100%}
.cw canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}
.inote{background:#f5f5f7;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11.5px;color:#3a3a3c;line-height:1.6;border:none}
.sec-title{font-size:11.5px;font-weight:700;color:#6e6e73;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid #e8e8ed;letter-spacing:.04em;text-transform:uppercase}
.err{margin:8px 20px;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:8px 12px;font-size:11px;color:#DC2626}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center">
    <div class="logo">🧺</div>
    <div class="title">
      <h1>핵심지표 대시보드</h1>
      <p id="st">기준: 2026년 6월 | 자유: [리텐션] 수거신청 기반 | 구독: [리텐션] 구독 수거신청 기반</p>
    </div>
  </div>
  <button class="sync-btn" id="syncBtn" onclick="doSync()">
    <span id="si">↻</span><span id="st2">데이터 동기화</span>
  </button>
</div>


<div style="padding:0 20px;background:#fff;border-bottom:1px solid #EBEDF0;display:flex">
  <button class="tab-btn active" id="tab-ov" onclick="go('ov',this)">📊 개요</button>
</div>
<div class="content" id="content"></div>

<script>
// ═══════════════════════════════════════
//  MONTHLY 18개월 (24-12 ~ 26-05)
// ═══════════════════════════════════════
const MO_MONTHS = ["24-12","25-01","25-02","25-03","25-04","25-05","25-06","25-07","25-08","25-09","25-10","25-11","25-12","26-01","26-02","26-03","26-04","26-05","26-06"];
const MO_NEW  = [11463,9176,9934,19637,28652,14583,11674,9445,9245,11877,26507,28280,16079,16484,14065,16865,18633,14620,12655];
const MO_D7   = [36.7,33.7,33.1,28.7,24.0,34.8,33.7,32.2,29.8,31.3,30.7,41.1,36.1,34.5,33.1,35.5,34.6,35.3,34.3];

// 자유 수거신청 기반 — M+1(가입→2회차), M+2(가입→3회차)
// 최근완성: M1=26-03(17.3%), M2=26-02(15.0%)
const MO_M1   = [18.1,21.2,22.0,22.1,19.5,17.1,17.6,21.1,21.0,22.4,18.1,14.4,18.6,19.0,22.1,20.9,19.9,18.6,null];
const MO_M2   = [16.4,19.4,18.5,15.1,13.7,13.3,14.7,17.4,20.2,17.2,13.7,12.0,15.1,18.5,17.1,16.8,null,null,null];

const SB_2D30 = [57.0,62.6,69.5,62.9,58.8,58.5,60.0,62.7,72.4,62.1,61.5,61.2,64.3,62.7,68.2,71.9,60.4,53.9,null];
const SB_3D30 = [43.0,51.1,60.0,45.7,41.2,38.2,42.9,53.3,62.5,48.6,41.9,40.7,52.5,48.5,55.8,49.1,34.6,33.4,null];

// 구독 갱신 기반 — M+1(2개월 구독 유지율), M+2(3개월 구독 유지율)
// 최근완성: M1=26-03(49.2%), M2=26-02(52.0%)
const SB_M1C  = [49.4,54.1,59.8,53.0,47.1,46.1,48.4,55.3,60.1,58.5,50.3,49.1,55.7,56.5,61.5,51.6,37.7,28.6,null];
const SB_M2C  = [43.6,48.4,46.0,38.9,35.1,34.1,40.6,45.5,52.3,47.6,39.0,36.8,44.9,43.5,49.3,40.5,null,null,null];

// 구독자수: 26-05 = 23,020 (5/31 실측값)
const SB_SUB  = [24188,23579,23130,23187,24504,26302,25597,24259,22739,21630,21428,22484,22838,22196,22385,22735,23970,23223,20003];
const SB_INC  = [-553,-404,-7,1137,1708,-637,-1194,-1510,-1134,-236,1036,538,-729,186,370,1275,665,-1543,-2951];
const MO_REV  = [3732,3210,3156,4252,4927,4712,3805,3450,3046,3104,3818,4195,3703,3464,3164,4388,5295,4435,3696];
const MO_REV_NET = MO_REV.map(v=>+(v/1.1).toFixed(1));

// Mission 기준/목표
const TARGETS = {자유b:15.6,자유t:25.6,구독b:39.3,구독t:59.3};

// ── 주간 데이터 (자유 2회차 탭에서 사용) ──────────────────────────────
const WK_LBL = ["12/1","12/8","12/15","12/22","12/29","1/5","1/12","1/19","1/26","2/2","2/9","2/16","2/23","3/2","3/9","3/16","3/23","3/30","4/6","4/13","4/20","4/27","5/4","5/11","5/18","5/25","6/1","6/8","6/15"];
const WK_NEW  = [4109,3257,3259,3881,3982,3632,3369,3994,3680,3560,2955,3506,3987,3400,3415,3822,4423,4805,4363,4732,4144,3361,3166,3365,3119,3459,3718,2630,2552];
const WK_D7   = [39.6,39.6,36.1,30.8,33.4,33.9,34.7,35.3,34.0,34.0,28.7,34.6,34.2,34.9,35.4,34.0,37.8,36.0,34.3,36.6,32.9,34.2,35.6,34.5,36.2,31.7,36.4,33.3,36.6];
// [weekly 지표] 월별 자유 2회차율 D30 (24-12~26-06, 19개월)
const FR2_MO = [28.1,27.3,30.5,31.3,30.8,29.7,27.9,29.1,30.2,27.0,26.7,23.9,25.6,27.9,26.4,28.9,26.3,23.3,18.6];

// 자유 2회차율 D30 — 전년도 동기 PY
// 12/1~3/16 (16주): 주간 실측값 / 3/23~5/4 (7주): 2025년 월별 평균값 근사 적용 (시트 스크린샷 확인)
// 2025년 월별: 1월27.3 / 2월30.5 / 3월31.3 / 4월30.8 / 5월29.7
const WK_FR2_PY_WK = [28.9,27.2,30.0,27.2,24.7,28.6,28.4,26.2,29.8,31.0,30.5,29.2,30.5,32.1,31.4,32.7,null,null,null,null,null,null,null,null,null,null,null,null,null];
const WK_FR2_PY_MO = [null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,31.3,31.3,30.8,30.8,30.8,30.8,29.7,29.7,29.7,27.9,27.9,27.9,27.9];
const WK_FR2_PY    = WK_FR2_PY_WK.map((v,i)=>v??WK_FR2_PY_MO[i]);  // 합산
// 자유 2회차율 D30 — 당해(CY 2025-12-01 ~ 2026-05-25), 최근 3주 null
const WK_FR2  = [25.3,26.8,24.8,25.4,26.5,26.3,27.3,30.2,26.9,25.5,26.8,28.7,26.2,31.1,31.5,28.4,27.4,27.1,27.4,24.8,24.8,25.1,23.8,22.0,23.1,23.7,20.7,23.4,19.1];

const GC="rgba(0,0,0,0.04)",TC="#94A3B8";
let charts={};

// ─── 유틸 ─────────────────────────
function lastVal(a){for(let i=a.length-1;i>=0;i--){if(a[i]!=null&&a[i]>0.5)return{v:a[i],i};}return{v:null,i:-1};}
function pct(v,d=1){return v==null?"—":v.toFixed(d)+"%";}
function num(v){return v==null?"—":Number(v).toLocaleString("ko-KR");}
function bil(v){return v==null?"—":(v/100).toFixed(1)+"억";}
function dlt(c,p,unit=""){
  if(c==null||p==null)return{t:"",col:"#888"};
  const d=c-p,ds=Math.abs(d)>1?Math.round(Math.abs(d)).toLocaleString("ko-KR"):Math.abs(d).toFixed(1);
  return{t:d>0?`▲ +${ds}${unit}`:d<0?`▼ -${ds}${unit}`:"─",col:d>0?"#16A34A":d<0?"#DC2626":"#888"};
}
function mName(code){const[y,m]=code.split("-");return `20${y}년 ${parseInt(m)}월`;}

function kpiHtml(lb,vl,mo,sb,d,a){
  return `<div class="kpi" style="--a:${a}">
    <div class="lb">${lb}</div><div class="vl">${vl}</div>
    ${mo?`<div class="mo">${mo}</div>`:""}
    ${sb?`<div class="sb">${sb}</div>`:""}
    ${d&&d.t?`<div class="dt" style="color:${d.col}">${d.t}</div>`:""}
  </div>`;
}
function missionHtml(lb,cur,b,t,ac,mo=""){
  const s=cur??0,p=Math.min(100,(s/t)*100),bp=Math.min(100,(b/t)*100),g=cur!=null?(t-s).toFixed(1):null;
  return `<div class="mission">
    <div class="lb">${lb}${mo?` <span style="font-weight:400;color:#aaa">(${mo})</span>`:""}</div>
    <div class="vrow">
      <span class="big" style="color:${ac}">${cur!=null?s.toFixed(1)+"%":"—"}</span>
      <span class="tgt">→ 목표 ${t}%</span>
      ${g?`<span class="gtag">-${g}%p</span>`:""}
    </div>
    <div class="bar-bg">
      <div style="position:absolute;left:${bp}%;top:0;bottom:0;width:2px;background:#CBD5E1;z-index:2"></div>
      <div class="bar-fill" style="width:${p}%;background:linear-gradient(90deg,${ac}55,${ac})"></div>
    </div>
    <div class="bar-lbs"><span>0</span><span>기준 ${b}%</span><span>목표 ${t}%</span></div>
  </div>`;
}
function cw(id,h=215){return `<div class="cw" style="height:${h}px"><canvas id="${id}"></canvas></div>`;}
function gopts(ex={}){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:"#555",font:{size:10,family:"Noto Sans KR"},boxWidth:10,padding:8}},
             tooltip:{backgroundColor:"#fff",borderColor:"#EBEDF0",borderWidth:1,titleColor:"#333",bodyColor:"#555",padding:7}},
    scales:{x:{grid:{color:GC},ticks:{color:TC,font:{size:9},maxRotation:45}},
            y:{grid:{color:GC},ticks:{color:TC,font:{size:9}}}},
    ...ex};
}
function kill(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

// ═══════════════════════════════════════
//  개요 렌더
// ═══════════════════════════════════════
function renderOv(){
  const el=document.getElementById("content");
  const li=MO_MONTHS.length-1, N=MO_MONTHS.length;

  const {v:curM2,i:m2i}=lastVal(MO_M2);
  const m2mo=m2i>=0?mName(MO_MONTHS[m2i]):"";
  const {v:lm2,i:lm2i}=lastVal(SB_M2C);
  const m2sbmo=lm2i>=0?mName(MO_MONTHS[lm2i]):"";
  const {v:lm1,i:lm1i}=lastVal(SB_M1C);
  const m1sbmo=lm1i>=0?mName(MO_MONTHS[lm1i]):"";
  const {v:fm1,i:fm1i}=lastVal(MO_M1);
  const m1fmo=fm1i>=0?mName(MO_MONTHS[fm1i]):"";
  const curRev=MO_REV_NET[li],prevRev=MO_REV_NET[li-1];
  const {v:curNew,i:kpiI}=lastVal(MO_NEW);
  const prevNew=kpiI>0?MO_NEW[kpiI-1]:null;
  const kpiMo=kpiI>=0?kpiI:li;

  // ── 미션 배너 ──────────────────────────
  function mBanner(lb,icon,bgCol,base,goal,cur,curMo,textCol){
    const gstyle=`color:${textCol};`;
    const curStyle=cur!=null?`background:${bgCol}22;color:${textCol};`:`background:#F0F1F3;color:#888;`;
    return `<div class="mbcard">
      <div class="icon" style="background:${bgCol}15;">${icon}</div>
      <div class="info">
        <div class="lb">${lb}</div>
        <div class="row">
          <span class="base">기준 ${base}%</span>
          <span class="arrow">→</span>
          <span class="goal" style="${gstyle}">목표 ${goal}%</span>
          ${cur!=null?`<span class="cur" style="${curStyle}">현재 ${cur.toFixed(1)}% <span style="font-size:9px;opacity:.7">${curMo}</span></span>`:`<span class="cur" style="${curStyle}">—</span>`}
        </div>
      </div>
    </div>`;
  }

  el.innerHTML=`
    <div class="mission-banner">
      ${mBanner("자유 가입→3회차 목표 (M2/M0)","🔄","#F97316",TARGETS.자유b,TARGETS.자유t,curM2,m2mo,"#EA580C")}
      ${mBanner("구독 3개월 유지율 목표 (M+2)","📋","#2563EB",TARGETS.구독b,TARGETS.구독t,lm2,m2sbmo,"#1D4ED8")}
    </div>

    <div class="inote">
      📌 <b>자유</b>: [리텐션] 수거신청 기반 M+1·M+2 &nbsp;|&nbsp; <b>구독</b>: [리텐션] 갱신 기반 2·3개월 유지율
      &nbsp;|&nbsp; 구독자수 26-05 = 23,223명 (5/31 실측값) / 26-06 = 20,003명 | 기준: 2026년 6월
    </div>

    <div class="kpi-row">
      ${kpiHtml("신규 가입자",num(curNew),mName(MO_MONTHS[kpiMo]),`vs ${mName(MO_MONTHS[kpiMo-1]||MO_MONTHS[0])}`,dlt(curNew,prevNew,"명"),"#2563EB")}
      ${kpiHtml("자유 가입→3회차 (M2/M0)",pct(curM2),m2mo,"최근 완성 코호트",null,"#F59E0B")}
      ${kpiHtml("구독자 수",num(SB_SUB[kpiMo]),mName(MO_MONTHS[kpiMo]),`순증 ${SB_INC[kpiMo]>=0?"+":""}${num(SB_INC[kpiMo])}명`,dlt(SB_SUB[kpiMo],SB_SUB[kpiMo-1],"명"),"#7C3AED")}
      ${kpiHtml("월 매출 (부가세 제외)",bil(MO_REV_NET[kpiMo]),mName(MO_MONTHS[kpiMo]),`결제액 ${bil(MO_REV[kpiMo])} (÷1.1)`,dlt(MO_REV_NET[kpiMo],MO_REV_NET[kpiMo-1],"백만원"),"#0D9488")}
    </div>

    <div class="mission-row">
      ${missionHtml("Mission 2 — 자유 가입→3회차 전환율",curM2,TARGETS.자유b,TARGETS.자유t,"#F59E0B",m2mo)}
      ${missionHtml("Mission 1 — 구독 3개월 유지율 (M+2)",lm2&&lm2>10?lm2:null,TARGETS.구독b,TARGETS.구독t,"#2563EB",m2sbmo)}
    </div>

    <div class="sec-title">▌ 신규 · 자유 퍼널</div>
    <div class="cards-2" style="margin-bottom:14px">
      <div class="card">
        <div class="ct">신규 가입자 &amp; 첫 주문 전환율 D+7</div>
        <div class="csub">월별 | 막대: 신규가입자 / 선: 첫주문전환율 D+7</div>
        ${cw("c1")}
      </div>
      <div class="card">
        <div class="ct">자유 퍼널 — 첫주문(D+7) → 2회차(M+1) → 3회차(M+2)</div>
        <div class="csub">수거신청 기반 월별 코호트 | null = 30일 미경과 또는 집계 중</div>
        ${cw("c2")}
      </div>
    </div>

    <div class="sec-title">▌ 구독</div>
    <div class="cards-2" style="margin-bottom:14px">

// ─── Apps Script 동기화 ─────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXtiuOcb0G459YZPa8dy1flWzHcXFEdyL4mtbWh7o8XQHHNW3ESW5RnQPBN_v_0JJo/exec";

async function doSync(){
  const btn=document.getElementById("syncBtn");
  const si=document.getElementById("si"),s2=document.getElementById("st2");
  const stEl=document.getElementById("st");
  btn.disabled=true;si.className="spin";si.textContent="↻";s2.textContent="동기화 중...";
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    const p=await res.json();
    if(p.error)throw new Error(p.error);
    function upd(t,s){if(Array.isArray(s)&&s.length>10){t.length=0;s.forEach(x=>t.push(x));}}
    if(p.mo_months)upd(MO_MONTHS,p.mo_months);
    if(p.mo_new)   upd(MO_NEW,   p.mo_new);
    if(p.mo_d7)    upd(MO_D7,    p.mo_d7);
    if(p.mo_m1)    upd(MO_M1,    p.mo_m1);
    if(p.mo_m2)    upd(MO_M2,    p.mo_m2);
    if(p.sb_m1c)   upd(SB_M1C,   p.sb_m1c);
    if(p.sb_m2c)   upd(SB_M2C,   p.sb_m2c);
    if(p.sb_sub)   upd(SB_SUB,   p.sb_sub);
    if(p.sb_inc)   upd(SB_INC,   p.sb_inc);
    if(p.mo_rev){upd(MO_REV,p.mo_rev);MO_REV_NET.length=0;MO_REV.forEach(v=>MO_REV_NET.push(+(v/1.1).toFixed(1)));}
    stEl.textContent=`마지막 업데이트: ${p.updated||new Date().toLocaleString("ko-KR")} ✓`;
    render();
  }catch(e){
    alert("⚠ 동기화 실패: "+e.message);
    stEl.textContent="동기화 실패 — 기존 데이터 유지";
  }
  btn.disabled=false;si.className="";si.textContent="↻";s2.textContent="데이터 동기화";
}

render();
function render(){
  kill();
  renderOv();
}
